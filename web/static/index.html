<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUPER HORNET // AI WINGMAN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="scanlines" aria-hidden="true"></div>
  <div id="vignette" aria-hidden="true"></div>

  <div id="app">
    <!-- HEADER BAR -->
    <header id="header">
      <div class="header-left">
        <span class="header-logo">SUPER HORNET</span>
        <span class="header-separator">//</span>
        <span class="header-subtitle">AI WINGMAN</span>
        <span class="header-separator">&mdash;</span>
        <span class="header-squadron">STANTON SECTOR</span>
      </div>
      <div class="header-right">
        <!-- Connection quality indicator -->
        <div class="conn-quality-indicator" id="conn-quality-group" role="status" aria-label="Connection quality">
          <span class="conn-quality-led conn-offline" id="conn-quality" aria-hidden="true"></span>
          <span class="conn-quality-label" id="conn-quality-text">OFFLINE</span>
        </div>
        <div class="header-divider" aria-hidden="true"></div>
        <div class="status-led-group" role="group" aria-label="Subsystem status indicators">
          <div class="status-indicator" id="status-game" role="status" aria-label="Game connection status">
            <span class="led led-red" aria-hidden="true"></span>
            <span class="status-label">GAME</span>
          </div>
          <div class="status-indicator" id="status-whisper" role="status" aria-label="Speech-to-text status">
            <span class="led led-red" aria-hidden="true"></span>
            <span class="status-label">STT</span>
          </div>
          <div class="status-indicator" id="status-chromadb" role="status" aria-label="Database status">
            <span class="led led-red" aria-hidden="true"></span>
            <span class="status-label">DB</span>
          </div>
          <div class="status-indicator" id="status-claude" role="status" aria-label="LLM status">
            <span class="led led-red" aria-hidden="true"></span>
            <span class="status-label">LLM</span>
          </div>
        </div>
      </div>
    </header>

    <!-- MAIN PANELS -->
    <main id="main">
      <!-- SHIP STATUS TERMINAL -->
      <section class="terminal-panel" id="telemetry-panel" aria-label="Ship status data">
        <div class="terminal-header">
          <span class="terminal-title">SHIP STATUS</span>
          <span class="terminal-led" id="telemetry-led" aria-hidden="true"></span>
        </div>
        <div class="terminal-content" id="telemetry-content">
          <div class="awaiting-link">AWAITING TELEMETRY LINK...</div>
        </div>
      </section>

      <!-- SUPER HORNET CHAT TERMINAL -->
      <section class="terminal-panel" id="chat-panel" aria-label="Super Hornet chat terminal">
        <div class="terminal-header">
          <span class="terminal-title">SUPER HORNET TERMINAL</span>
          <span class="terminal-led" id="chat-led" aria-hidden="true"></span>
        </div>
        <div class="terminal-content" id="chat-content">
          <div class="chat-messages" id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages">
            <div class="chat-welcome" id="chat-welcome" aria-label="Welcome message">
              <span class="chat-welcome-callsign">SUPER HORNET ONLINE</span>
              <span class="chat-welcome-prompt">Ready for tasking, Commander. Type a command below or hold SPACE to transmit voice.</span>
            </div>
          </div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Enter command, Commander... (SPACE = push-to-talk)" autocomplete="off" spellcheck="false" aria-label="Chat input">
          <button id="scan-button" class="scan-button" aria-label="Scan screen" title="Capture and analyze screen">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <span>SCAN</span>
          </button>
        </div>
      </section>
    </main>

    <!-- FOOTER / VOICE BAR -->
    <footer id="footer">
      <div class="voice-section">
        <button id="ptt-button" class="ptt-button" aria-label="Push to talk">
          <svg class="mic-icon" viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
          <span class="ptt-label">PUSH TO TALK</span>
        </button>
        <div class="waveform-container">
          <canvas id="waveform-canvas" width="400" height="60" aria-label="Audio waveform visualization" role="img"></canvas>
        </div>
        <div class="voice-status" id="voice-status" role="status" aria-live="polite">
          <span class="voice-status-text">IDLE</span>
        </div>
        <div class="volume-control">
          <label class="volume-label" for="tts-volume">VOL</label>
          <input type="range" id="tts-volume" class="volume-slider" min="0" max="1" step="0.05" value="0.8" aria-label="TTS volume">
          <span class="volume-pct" id="volume-pct" aria-live="polite">80%</span>
        </div>
      </div>
    </footer>
  </div>

  <audio id="tts-audio" preload="none"></audio>
  <script src="/static/app.js"></script>
  <script>
    // Hide static welcome message once app.js adds real chat messages
    (function() {
      var chatMessages = document.getElementById('chat-messages');
      if (!chatMessages) return;
      var observer = new MutationObserver(function() {
        var welcome = document.getElementById('chat-welcome');
        if (welcome && chatMessages.children.length > 1) {
          welcome.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(chatMessages, { childList: true });
    })();
  </script>
</body>
</html>
