# Super Hornet - AI Agent for Star Citizen
# Docker Compose configuration for local services.
#
# Usage:
#   docker compose up -d              # start all services
#   docker compose up -d chromadb     # start only ChromaDB
#   docker compose logs -f whisper    # follow whisper logs

services:
  # ---------------------------------------------------------------------------
  # Whisper - Local speech-to-text via faster-whisper HTTP API
  # Provides an OpenAI-compatible /v1/audio/transcriptions endpoint.
  # ---------------------------------------------------------------------------
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: hornet-whisper
    ports:
      - "9090:8000"
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-medium}
      - WHISPER__INFERENCE_DEVICE=cpu
    volumes:
      - whisper_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - constellation
    # -------------------------------------------------------------------------
    # GPU acceleration (NVIDIA). Uncomment the lines below and comment out
    # the CPU image above if you have an NVIDIA GPU and nvidia-container-toolkit.
    # -------------------------------------------------------------------------
    # image: fedirz/faster-whisper-server:latest-cuda
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # ChromaDB - Vector store for RAG and Skill Library
  # Stores Star Citizen knowledge base (ships, trade data, game lore) and
  # learned action sequences (Voyager-inspired skill library).
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: hornet-chromadb
    ports:
      - "8000:8000"
    environment:
      - ANONYMIZED_TELEMETRY=false
      - IS_PERSISTENT=TRUE
    volumes:
      - ./data/chroma_db:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - constellation

  # ---------------------------------------------------------------------------
  # Telemetry Service - Universal telemetry hub for sim adapters
  # Receives telemetry from adapters, broadcasts to consumers via WebSocket.
  # ---------------------------------------------------------------------------
  telemetry:
    build:
      context: ./telemetry-service
      dockerfile: Dockerfile
    container_name: hornet-telemetry
    ports:
      - "3839:3839"
    environment:
      - TELEMETRY_HOST=0.0.0.0
      - TELEMETRY_PORT=3839
      - TELEMETRY_LOG_LEVEL=INFO
      - TELEMETRY_STATE_PATH=/data/state.json
    volumes:
      - telemetry_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3839/api/health"]
      interval: 10s
      timeout: 5s
      start_period: 5s
    networks:
      - constellation

  # ---------------------------------------------------------------------------
  # Orchestrator - Super Hornet's brain
  # Coordinates between Claude, perception layer, Whisper, and ChromaDB.
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: hornet-orchestrator
    ports:
      - "3838:3838"
    depends_on:
      whisper:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - WHISPER_URL=http://whisper:8000
      - CHROMADB_URL=http://chromadb:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - constellation

volumes:
  whisper_cache:
    driver: local
  telemetry_data:
    driver: local

networks:
  constellation:
    name: constellation
    driver: bridge
